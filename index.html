<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Face Mask Detector</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e24; /* Dark Background */
            color: #fff;
            text-align: center;
            padding: 30px;
        }
        .video-box {
            margin: 20px auto;
            border: 4px solid #4caf50;
            border-radius: 12px;
            overflow: hidden;
            width: 640px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.5);
        }
        img {
            display: block;
            width: 100%;
        }
        h1 { color: #4caf50; }
    </style>
</head>
<body>

    <h1>Face Mask Detection - Live Dashboard</h1>
    <p>AI System running in a web browser using Flask & OpenCV</p>

    <div class="video-box">
        <img src="{{ url_for('video_feed') }}">
    </div>

    <p style="color: #aaa;">Press Ctrl + C in the terminal to stop the server</p>

</body>
</html>
